{% extends "base.html" %} 
{% block content %}
<div class="text-center">
    <h2>Upload Image for Classification</h2>
    <form id="upload-file" method="post" enctype="multipart/form-data">
        <label for="imageUpload" class="btn btn-outline-primary mt-3">
            Select Image
        </label>
        <input type="file" name="file" id="imageUpload" accept=".png, .jpg, .jpeg" style="display:none;">
    </form>

    <div class="image-section" style="display:none;">
        <div class="img-preview mb-3">
            <div id="imagePreview"></div>
        </div>
        <button type="button" class="btn btn-success btn-lg" id="btn-predict">Predict!</button>
    </div>

    <div class="loader mt-3" style="display:none;">
        <div class="spinner-border text-primary"></div>
        <p>Analyzing...</p>
    </div>

    <h3 id="result" class="mt-4 text-info">
        <span></span>
    </h3>
</div>
{% endblock %}
